<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTENA</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}
body{
background: linear-gradient(135deg,#5f2c82,#ff7eb3);
min-height:100vh;
}
/* topo */
header{
text-align:center;
padding:40px;
}
.logo{
height: 300px
}
/* conteúdo */
.container{
max-width:800px;
margin:auto;
}
/* cards */
.card{
background:white;
padding:25px;
border radius: 20px;px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.card h2{
margin-bottom:10px;
}
.card p{
color:#555;
}
/* botões */
.botoes{
display:flex;
gap:15px;
margin-top:15px;
}
button{
padding:15px 20px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
}
.ajuda{
background:#6a3bd2;
color:white;
}
.info{
background:white;
color:#6a3bd2;
border:2px solid #6a3bd2;
}
/* efeito */
button:hover{
transform:scale(1.05);
transition:0.3s;
}
</style>
</head>
<body>
<header>
<img src="ChatGPT Image 11 de fev. de 2026, 10_30_59 1.png" class="logo">
<div class="Menu">
<a href="login.html">entrar</a> 
<a href="cadastro.html">Criar conta</a>
<a href="contato.html">contato</a>
</div>
</header>
<div class="container">
<div class="card">
<h2>Bem-vindo ao Utena!</h2>
<p>Você não está sozinha. Escute-se, você merece proteção.</p>
<div class="botoes">
<button class="ajuda">Pedir ajuda</button>
<button class="info">Obter informações</button>
</div>
</div>
<div class="card">
<h2>Precisa de ajuda?</h2>
<p>Entre em contato conosco para qualquer dúvida ou suporte. Estamos aqui para ajudar você.</p>
</div>
</div>
</body>
</html>
