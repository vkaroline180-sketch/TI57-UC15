<!DOCTYPE html>
<html>
<head>
<title>Criar conta</title>
<style>

body{

font-family:Arial;

background: linear-gradient(135deg,#5f2c82,#ff7eb3);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

padding:30px;

border-radius:20px;

width:320px;

text-align:center;

}

input{

width:100%;

padding:10px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

background:#6a3bd2;

color:white;

border:none;

border-radius:20px;
}

</style>
</head>
<body>
<div class="card">
<h2>Criar conta</h2>
<input type="text" placeholder="Nome">
<input type="email" placeholder="Email">
<input type="password" placeholder="Senha">
<button>Criar conta</button>
</div>
</body>
</html>
