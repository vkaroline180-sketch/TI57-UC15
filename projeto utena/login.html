<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>

body{

font-family:Arial;

background: linear-gradient(135deg,#5f2c82,#ff7eb3);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

padding:30px;

border-radius:20px;

width:300px;

text-align:center;

}

input{

width:100%;

padding:10px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

background:#603eaa;

color:white;

border:none;

border-radius:20px;

}
</style>
</head>
<body>
<div class="card">
<h2>Entrar</h2>
<input type="email" placeholder="Email">
<input type="password" placeholder="Senha">
<button>Entrar</button>
</div>
</body>
</html>
